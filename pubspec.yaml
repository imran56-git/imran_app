name: find_your_best_teacher_today
description: A Flutter app to find your best teacher today.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.1.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  lottie: ^3.1.2
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.1
  firebase_core: ^3.6.0
  firebase_messaging: ^15.1.0
  image_picker: ^1.1.2
  geolocator: 11.0.0
  google_maps_flutter: ^2.10.0
  geocoding: ^3.0.0
  google_sign_in: ^6.2.1
  emoji_picker_flutter: ^2.0.0
  flutter_sound: ^9.2.13
  permission_handler: ^11.3.1
  path_provider: ^2.1.4
  file_picker: ^8.1.4
  uuid: ^4.5.1
  url_launcher: ^6.3.0
  font_awesome_flutter: ^10.7.0
  flutter_image_compress: ^2.3.0
  firebase_storage: ^12.3.0
  flutter_webrtc: 0.12.2
  intl: ^0.19.0
  jitsi_meet_flutter_sdk: ^11.6.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/app_logo.png"

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/animation/
